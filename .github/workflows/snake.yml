name: Generate Contribution Snake

on:
  # Run automatically every 24 hours (at midnight UTC)
  schedule:
    - cron: "0 0 * * *"  
  
  # Allows you to manually run the job at any time
  workflow_dispatch:
  
  # Run on every push to the default branches
  push:
    branches:
    - master
    - main

jobs:
  generate:
    # Grants the necessary write permissions to the GITHUB_TOKEN for deployment
    permissions:  
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Step 1: Check out the repository code (Required for the deployment step)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Create dist directory
      - name: Create dist Directory
        run: mkdir -p dist

      # Step 3: Generates the snake SVG files 
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Verify SVG files were generated
      - name: Verify Generated Files
        run: |
          if [ -f "dist/github-contribution-grid-snake.svg" ]; then
            echo "✓ Snake SVG generated successfully"
            ls -lh dist/
          else
            echo "✗ Failed to generate SVG files"
            exit 1
          fi

      # Step 5: Pushes the generated content to the 'output' branch
      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          committer_name: github-actions[bot]
          committer_email: github-actions[bot]@users.noreply.github.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
