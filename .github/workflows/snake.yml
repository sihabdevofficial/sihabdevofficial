name: Generate Snake Contribution

on:
  # Schedule the workflow to run daily at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  
  # Allow manual triggering of the workflow
  workflow_dispatch:
  
  # Trigger the workflow on pushes to the main branch
  push:
    branches:
      - main
      - master # Added 'master' for common compatibility

jobs:
  generate:
    # IMPORTANT: Define write permissions for the GITHUB_TOKEN for this job
    permissions:
      contents: write 
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Reduced timeout since this is a fast job
    
    steps:
      # Step 1: Checkout the repository
      # This is required for the deploy step to work correctly
      - name: Checkout Repository
        uses: actions/checkout@v4 

      # Step 2: Generate the snake animations
      - name: Generate GitHub Contributions Snake Animations
        # Using the svg-only variant for better performance and common use
        uses: Platane/snk/svg-only@v3 
        with:
          # GitHub username to generate the animation for
          github_user_name: ${{ github.repository_owner }}

          # Define the output files and their configurations
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
        env:
          # Note: The GITHUB_TOKEN is required to fetch contributions data securely
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Deploy the generated files to the 'output' branch
      # Using crazy-max/ghaction-github-pages is often simpler for deployment
      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          # The GITHUB_TOKEN is used here automatically by the action 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
